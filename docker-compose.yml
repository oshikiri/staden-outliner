services:
  api:
    build:
      context: .
      target: dev
    command: bun run dev:api
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      STADEN_ROOT: /app/docs
      NODE_ENV: development
      HOST: 0.0.0.0
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    tty: true
    stdin_open: true

  web:
    build:
      context: .
      target: dev
    command: bun run dev:web
    depends_on:
      - api
    ports:
      - "127.0.0.1:5173:5173"
    environment:
      VITE_API_BASE_URL: http://127.0.0.1:3001
      NODE_ENV: development
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules
    tty: true
    stdin_open: true

volumes:
  api_node_modules:
  web_node_modules:
