name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check code formatting
        run: bun run format:check

      - name: Run linter with reports
        run: bun run lint -- --format=json --output-file=eslint-report.json

      - name: Upload lint results
        if: hashFiles('eslint-report.json') != ''
        uses: actions/upload-artifact@v7.0.1
        with:
          name: eslint-report
          path: eslint-report.json

      - name: Run type check
        run: bun run typecheck

      - name: Run unit tests with coverage
        run: bun run test-coverage

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6.0.0
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2.2.0
        with:
          bun-version: "1.3.12"

      - name: Cache Vega bundles
        id: cache-vega-e2e
        uses: actions/cache@v5.0.5
        with:
          path: |
            public/vega.js
            public/vega-lite.js
            public/vega-embed.js
          key: ${{ runner.os }}-vega-${{ hashFiles('scripts/setup-vega.sh') }}

      - name: Setup Vega bundles
        if: steps.cache-vega-e2e.outputs.cache-hit != 'true'
        run: ./scripts/setup-vega.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run build
        run: bun run build

      - name: Check compiled binary startup
        run: |
          PORT=3002 ./dist/staden ./e2e/ &
          server_pid=$!
          trap 'kill $server_pid' EXIT

          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:3002/ >/dev/null; then
              exit 0
            fi
            sleep 1
          done

          echo "Compiled binary did not respond on http://127.0.0.1:3002/"
          exit 1

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v7.0.1
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
