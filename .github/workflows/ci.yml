name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check code formatting
        run: bun run format:check

      - name: Run linter with reports
        run: bun run lint -- --format=json --output-file=eslint-report.json

      - name: Upload lint results
        if: hashFiles('eslint-report.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: eslint-report
          path: eslint-report.json

      - name: Run type check
        run: bun run typecheck

      - name: Run unit tests with coverage
        run: bun run test-coverage

      - name: Run build
        run: bun run build

      - name: Upload coverage reports
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage/lcov.info
          flags: unittests
          name: codecov-umbrella

  e2e:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: write
    # if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.12"

      - name: Cache Vega bundles
        id: cache-vega-e2e
        uses: actions/cache@v5
        with:
          path: |
            public/vega.js
            public/vega-lite.js
            public/vega-embed.js
          key: ${{ runner.os }}-vega-${{ hashFiles('scripts/setup-vega.sh') }}

      - name: Setup Vega bundles
        if: steps.cache-vega-e2e.outputs.cache-hit != 'true'
        run: ./scripts/setup-vega.sh

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Run E2E tests
        run: bun run test:e2e

      - name: Upload E2E test results
        uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
